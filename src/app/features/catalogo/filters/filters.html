<aside class="filters">
  <div class="filters-header" [class.open]="mostrarFiltros" (click)="toggleFiltros()">
    <div class="filters-title">
      <i class="ri-equalizer-line filter-icon"></i>
      <span>Filtros</span>
    </div>

    <i class="ri-arrow-down-s-line" [class.rotate]="mostrarFiltros"> </i>
  </div>

  <hr class="desktop-divider" />

  <div class="filters-content" [class.open]="mostrarFiltros || !esMovil()">
    <!-- Categoría -->
    <div class="filter-group cat">
      <div class="filter-title">
        <span>Categoría</span>
      </div>

      <label>
        <input type="checkbox" [(ngModel)]="filtros.categoria.hombre" />
        Hombre
      </label>

      <label>
        <input type="checkbox" [(ngModel)]="filtros.categoria.mujer" />
        Mujer
      </label>

      <label>
        <input type="checkbox" [(ngModel)]="filtros.categoria.unisex" />
        Unisex
      </label>

      <label>
        <input type="checkbox" [(ngModel)]="filtros.categoria.combo" />
        Combo
      </label>
    </div>

    <hr />

    <!-- Marcas -->

    <div class="filter-group">
      <div class="filter-title">
        <span>Marcas</span>
      </div>

      <label>
        <input type="checkbox" [(ngModel)]="filtros.marcas.jeanPaulGaultier" />
        Jean Paul Gaultier
      </label>

      <label>
        <input type="checkbox" [(ngModel)]="filtros.marcas.giorgioArmani" />
        Giorgio Armani
      </label>

      <label>
        <input type="checkbox" [(ngModel)]="filtros.marcas.armaf" />
        Armaf
      </label>

      <label>
        <input type="checkbox" [(ngModel)]="filtros.marcas.dior" />
        Dior
      </label>

      <label>
        <input type="checkbox" [(ngModel)]="filtros.marcas.creed" />
        Creed
      </label>
    </div>

    <hr />

    <!-- Precio -->

    <div class="filter-group">
      <h3>Rango de precio</h3>

      <div class="price-range">
        <input
          type="text"
          currencyInput
          [(ngModel)]="filtros.precio.minimo"
          (blur)="validarPrecio('minimo')"
          (keydown.enter)="quitarFoco($event)"
          [class.error]="precioMinError"
        />

        <input
          type="text"
          currencyInput
          [(ngModel)]="filtros.precio.maximo"
          (blur)="validarPrecio('maximo')"
          (keydown.enter)="quitarFoco($event)"
          [class.error]="precioMaxError"
        />
      </div>

      <small class="mensaje-error" *ngIf="precioMinError"> El mínimo permitido es $75.000 </small>

      <small class="mensaje-error" *ngIf="precioMaxError"> El máximo permitido es $500.000 </small>

      <div class="price-info">
        <p>Min. $75.000</p>
        <p class="max">Max. $500.000</p>
      </div>
    </div>

    <button class="clear-btn" (click)="limpiarFiltros()">Limpiar filtros</button>
  </div>
</aside>
